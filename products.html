                    /* Loading Screen Styles */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f6f6f6, #b4c3e7); /* Navy Blue Gradient */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #00b4e1; /* Gold */
            border-top: 6px solid transparent;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loading p {
            color: #06c9ff; /* Gold */
            font-size: 18px;
            margin-top: 20px;
            font-weight: 500;
        }

        .header {

            padding-bottom: 10px;

        .header img {
            width: 50px;
            height: 50px;

        }
        #searchBar {
            width: 50%;
            padding: 12px 20px;
            margin-bottom: 25px;
            font-size: 16px;
            border: 2px solid #dfe6e9;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #f7f9fb;
        }
        #searchBar:focus {
            border-color: #d4af37; /* Gold */
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
        }
        th {
            background: linear-gradient(90deg, #1a2a44, #2e4372); /* Navy Blue Gradient */
            color: white;
            font-weight: 500;
            text-transform: uppercase;
        }
        tr {
            transition: background 0.3s;
        }
        tr:nth-child(even) {
            background: #f8fafc;
        }
        tr:hover {
            background: #e6eef5;
        }
        .add-to-cart {
            padding: 8px 15px;
            background: #d4af37; /* Gold */
            color: #1a2a44;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .add-to-cart:hover {
            background: #c19b32;
        }
        input[type="number"] {
            width: 60px;
            padding: 6px;
            border-radius: 5px;
            border: 1px solid #dfe6e9;
            margin-right: 10px;
            background: #fff;
            color: #1a2a44;
        }
        #cartBar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #1a2a44, #2e4372); /* Navy Blue Gradient */
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            transition: all 0.3s;
        }
        #cartBar:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .cart-buttons {
            display: flex;
            gap: 10px;
        }
        .cart-buttons button {
            padding: 8px 15px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            min-width: 120px;
            background: #0dc7fa; /* Gold */
            color: #1a2a44;
        }
        .cart-buttons button:hover {
            background: #c19b32;
        }
        #emailModal, #cartModal {

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
            max-height: 80vh;
            overflow-y: auto;
        }
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h2 {
            margin-top: 0;
            color: #1a2a44;
            font-size: 24px;
            text-align: center;

        }

        let cart = [];

        // Populate table
        function populateTable(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="Items">${row.item}</td>
                    <td data-label="Sale Price">${row.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                    <td data-label="Quantity">
                        <input type="number" class="quantity-input" data-index="${index}" min="1" value="1">
                    </td>
                    <td data-label="Action"><button class="add-to-cart" data-index="${index}">Add to Cart</button></td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // Search functionality
        document.getElementById('searchBar').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = itemsData.filter(row => row.item.toLowerCase().includes(searchTerm));
            populateTable(filteredData);
        });

        // Add to cart
        document.getElementById('itemsTable').addEventListener('click', function(e) {
            if (e.target.classList.contains('add-to-cart')) {
                const index = e.target.getAttribute('data-index');
                const quantity = parseInt(document.querySelector(`.quantity-input[data-index="${index}"]`).value);
                if (quantity > 0) {
                    const item = { ...itemsData[index], quantity };
                    cart.push(item);
                    updateCartBar();
                } else {
                    alert('Please enter a valid quantity.');
                }
            }
        });

        // Update cart bar
        function updateCartBar() {
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = cartCount;
        }

        // Email modal handling
        const emailModal = document.getElementById('emailModal');
        document.getElementById('sendCart').addEventListener('click', function() {
            if (cart.length === 0) {
                alert('Cart is empty!');
                return;
            }
            emailModal.style.display = 'flex';
        });

        document.getElementById('modalCancel').addEventListener('click', function() {
            emailModal.style.display = 'none';
        });

        document.getElementById('modalSubmit').addEventListener('click', function() {
            const senderName = document.getElementById('senderName').value.trim();
            const senderContact = document.getElementById('senderContact').value.trim();
            const senderOrg = document.getElementById('senderOrg').value.trim();
            const senderPlace = document.getElementById('senderPlace').value.trim();
            if (!senderName || !senderContact || !senderOrg || !senderPlace) {
                alert('Please fill in all fields.');
                return;
            }
            const cartText = cart.map(item => `${item.item}: ${item.quantity} x ${item.price.toLocaleString('en-US', { minimumFractionDigits: 2 })} = ${(item.price * item.quantity).toLocaleString('en-US', { minimumFractionDigits: 2 })}`).join('\n');
            const subject = 'Order from Gasdaniel Company Catalog';
            const body = `Order Details:\n\nSender Name: ${senderName}\nSender Contact: ${senderContact}\nOrganization: ${senderOrg}\nPlace: ${senderPlace}\nDate: ${new Date().toLocaleDateString()}\n\nCart Contents:\n${cartText}\n\nTotal Items: ${cart.reduce((sum, item) => sum + item.quantity, 0)}\nTotal Price: ${cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
            const mailtoLink = `mailto:order.gasdaniel@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            window.location.href = mailtoLink;
            emailModal.style.display = 'none';
            document.getElementById('senderName').value = '';
            document.getElementById('senderContact').value = '';
            document.getElementById('senderOrg').value = '';
            document.getElementById('senderPlace').value = '';
        });

        // View cart modal handling
        const cartModal = document.getElementById('cartModal');
        document.getElementById('viewCart').addEventListener('click', function() {
            if (cart.length === 0) {
                alert('Cart is empty!');
                return;
            }
            const cartItemsList = document.getElementById('cartItems');
            const cartTotalPrice = document.getElementById('cartTotalPrice');
            cartItemsList.innerHTML = '<ul>' + cart.map(item => `<li>${item.item}: ${item.quantity} x ${item.price.toLocaleString('en-US', { minimumFractionDigits: 2 })} = ${(item.price * item.quantity).toLocaleString('en-US', { minimumFractionDigits: 2 })}</li>`).join('') + '</ul>';
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalPrice.textContent = `Total Price: ${totalPrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            cartModal.style.display = 'flex';
        });

        document.getElementById('cartClose').addEventListener('click', function() {
            cartModal.style.display = 'none';
        });

        // Initial population of table
        populateTable(itemsData);

         // Function to hide loading screen and show main content
            function hideLoading() {
                const loading = document.getElementById('loading');
                const mainContent = document.getElementById('main-content');
                
                // Fade out loading screen
                loading.classList.add('hidden');
                
                // Show main content after fade-out transition
                setTimeout(() => {
                    loading.style.display = 'none';
                    mainContent.style.display = 'block';
                    document.body.style.overflow = 'auto'; // Restore scrolling
                }, 500); // Match the transition duration in CSS
            }
    
            // Simulate loading delay (e.g., 2 seconds) or use window.onload
            window.onload = function() {
                setTimeout(hideLoading, 2000); // 2-second delay for demonstration
                // Alternatively, use: hideLoading(); to hide immediately after load
            };
